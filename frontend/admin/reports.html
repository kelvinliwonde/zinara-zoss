<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - ZINARA ZOSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-blue-900 text-white shadow-lg fixed w-full z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fas fa-road text-2xl"></i>
                <span class="text-xl font-bold">ZINARA ZOSS</span>
            </div>
            <div class="flex items-center space-x-6">
                <a href="../dashboard.html" class="hover:text-blue-200 transition">Dashboard</a>
                <a href="index.html" class="hover:text-blue-200 transition">Admin</a>
                <a href="reports.html" class="text-yellow-300 font-semibold">Reports</a>
                <button onclick="handleLogout()" class="bg-red-600 hover:bg-red-700 px-4 py-2 rounded-lg transition text-sm">
                    <i class="fas fa-sign-out-alt mr-2"></i>Logout
                </button>
            </div>
        </div>
    </nav>

    <div class="pt-20 container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-gray-900 mb-6">Reports & Analytics</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-md card-hover cursor-pointer">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-calendar-alt text-blue-600 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-semibold">Revenue Report</h4>
                        <p class="text-sm text-gray-500">View monthly revenue</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md card-hover cursor-pointer">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-users text-green-600 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-semibold">User Report</h4>
                        <p class="text-sm text-gray-500">User growth analytics</p>
                    </div>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md card-hover cursor-pointer">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-file-alt text-purple-600 text-xl"></i>
                    </div>
                    <div>
                        <h4 class="font-semibold">Application Report</h4>
                        <p class="text-sm text-gray-500">Application trends</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md mb-8">
            <h3 class="text-lg font-semibold mb-4">Monthly Revenue (2026)</h3>
            <div class="h-80">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md">
            <h3 class="text-lg font-semibold mb-4">Generate Custom Report</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="form-label">Start Date</label>
                    <input type="date" class="form-input">
                </div>
                <div>
                    <label class="form-label">End Date</label>
                    <input type="date" class="form-input">
                </div>
                <div>
                    <label class="form-label">Report Type</label>
                    <select class="form-input">
                        <option>Revenue</option>
                        <option>Applications</option>
                        <option>Users</option>
                    </select>
                </div>
            </div>
            <button onclick="generateReport()" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                <i class="fas fa-download mr-2"></i>Generate Report
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
                    datasets: [{
                        label: 'Revenue (USD)',
                        data: [1250, 1500, 1800, 2100, 1950, 2300, 2500, 2800, 2600, 3100, 3400, 3800],
                        borderColor: '#1E3A8A',
                        backgroundColor: 'rgba(30, 58, 138, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        });
    </script>
    <script src="../js/app.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
