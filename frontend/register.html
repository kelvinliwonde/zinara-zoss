<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ZINARA ZOSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;">
    <div style="width: 100%; max-width: 440px;">
        <div style="background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-radius: 32px; padding: 2.5rem 2rem; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 40px 80px rgba(0,0,0,0.5);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="display: inline-flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); padding: 8px 20px; border-radius: 20px;">
                    <i class="fas fa-road" style="font-size: 1.8rem; color: #fbbf24;"></i>
                    <span style="font-weight: 800; font-size: 1.4rem; color: white; letter-spacing: -0.5px;">ZINARA <span style="color: #fbbf24;">ZOSS</span></span>
                </div>
                <h2 style="color: white; font-size: 1.8rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.25rem;">Create Account</h2>
                <p style="color: rgba(255,255,255,0.5); font-size: 0.9rem;">Join the future of license renewal</p>
            </div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label style="color: rgba(255,255,255,0.7); font-weight: 600; font-size: 0.85rem;">Full Name</label>
                    <div style="position: relative;">
                        <i class="fas fa-user" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3);"></i>
                        <input id="full_name" type="text" required placeholder="John Doe"
                               style="width: 100%; padding: 14px 16px 14px 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: white; font-size: 0.95rem; transition: all 0.3s ease; outline: none;">
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: rgba(255,255,255,0.7); font-weight: 600; font-size: 0.85rem;">National ID</label>
                    <div style="position: relative;">
                        <i class="fas fa-id-card" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3);"></i>
                        <input id="national_id" type="text" required placeholder="63-123456X"
                               style="width: 100%; padding: 14px 16px 14px 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: white; font-size: 0.95rem; transition: all 0.3s ease; outline: none;">
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: rgba(255,255,255,0.7); font-weight: 600; font-size: 0.85rem;">Email Address</label>
                    <div style="position: relative;">
                        <i class="fas fa-envelope" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3);"></i>
                        <input id="email" type="email" required placeholder="john.doe@gmail.com"
                               style="width: 100%; padding: 14px 16px 14px 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: white; font-size: 0.95rem; transition: all 0.3s ease; outline: none;">
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: rgba(255,255,255,0.7); font-weight: 600; font-size: 0.85rem;">Phone Number</label>
                    <div style="position: relative;">
                        <i class="fas fa-phone" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3);"></i>
                        <input id="phone" type="tel" required placeholder="0712345678"
                               style="width: 100%; padding: 14px 16px 14px 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: white; font-size: 0.95rem; transition: all 0.3s ease; outline: none;">
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: rgba(255,255,255,0.7); font-weight: 600; font-size: 0.85rem;">Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-lock" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3);"></i>
                        <input id="password" type="password" required placeholder="Min 8 characters"
                               style="width: 100%; padding: 14px 16px 14px 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: white; font-size: 0.95rem; transition: all 0.3s ease; outline: none;">
                    </div>
                </div>
                <div class="form-group">
                    <label style="color: rgba(255,255,255,0.7); font-weight: 600; font-size: 0.85rem;">Confirm Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-check-circle" style="position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.3);"></i>
                        <input id="confirm_password" type="password" required placeholder="Confirm your password"
                               style="width: 100%; padding: 14px 16px 14px 48px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; color: white; font-size: 0.95rem; transition: all 0.3s ease; outline: none;">
                    </div>
                </div>
                <button type="submit" id="registerBtn"
                        style="width: 100%; padding: 16px; background: linear-gradient(135deg, #fbbf24, #f59e0b); border: none; border-radius: 14px; color: #1a1a2e; font-weight: 700; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 0.5rem;">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
                <div style="text-align: center; margin-top: 1.2rem;">
                    <p style="color: rgba(255,255,255,0.4); font-size: 0.85rem;">
                        Already have an account? 
                        <a href="login.html" style="color: #fbbf24; text-decoration: none; font-weight: 600;">Sign in</a>
                    </p>
                </div>
            </form>
            <div id="errorMessage" style="display: none; margin-top: 1rem; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem;"></div>
            <div id="successMessage" style="display: none; margin-top: 1rem; background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3); color: #34d399; padding: 12px 16px; border-radius: 12px; font-size: 0.9rem;"></div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
